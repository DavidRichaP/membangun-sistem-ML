name: dicoding sistem ML pipeline CI

on: 
  push:
    branches: ["main"]
jobs:
  development-checks:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
    # clones repository files to github VM
      - name: clone repository code
        uses: actions/checkout@v4

    # installs all dependencies
      - name: miniconda setup
        uses: conda-incubator/setup-miniconda@v3
        with: 
          auto-activate-base: true
          python-version: "3.12.7"

      - name: install mlflow cli
        shell: bash -el {0}
        run: |
          pip install mlflow

      - name: run MLflow Project
        shell: bash -el {0}
        # Correctly structured step environment variable
        env: 
          MLFLOW_ALLOW_FILE_STORE: "true"
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
        run: |
          cd workflow-ci/mlproject
          
          # Clean out past iterations cleanly
          rm -rf mlruns .mlflow mlflow.db
          
          # Execute the project step 
          mlflow run . --env-manager=conda -P df_path="gender_classif_v7_preprocessed.csv"
      
      - name: save mlruns to repo
        run: |
          git config --global user.name "${{ secrets.username }}"
          git config --global user.email "${{ secrets.email }}"
          
          # Copy the generated data back into your workspace folder to commit it
          cp -r /tmp/mlruns workflow-ci/mlproject/mlruns
          
          git add workflow-ci/mlproject/mlruns/
          if ! git diff --cached --quiet; then
            git commit -m "save mlruns from CI run [skip ci]"
            git push origin main
          else
            echo "no new mlflow tracking changes detected. skipping commit"
          fi

      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-tracking-data
          path: /tmp/mlruns/

      - name: Build Docker Image via MLflow
        shell: bash -el {0}
        run: |
          # Point directly to the local runner folder to find the run IDs
          LATEST_RUN=$(ls -t /tmp/mlruns/0 | grep -v "meta.yaml" | head -n 1)
          MODEL_URI="/tmp/mlruns/0/$LATEST_RUN/artifacts/model"
          
          echo "Building docker image using model from: $MODEL_URI"
          
          mlflow models build-docker \
            -m "$MODEL_URI" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/dicoding-ml-pipeline:latest"